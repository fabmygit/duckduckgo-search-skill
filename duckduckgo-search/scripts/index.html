<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const jsonData = JSON.parse(data);
                const query = jsonData.query || "test";
                // DEIN API-KEY HIER EINTRAGEN
                const API_KEY = process.env.JINA_API_KEY; 

                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);

                let debugInfo = `Query: ${query}\n`;

                try {
                    const url = `https://s.jina.ai/${encodeURIComponent(query)}`;
                    debugInfo += `Fetching: ${url}\n`;

                    const response = await fetch(url, {
                        signal: controller.signal,
                        headers: { 
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${API_KEY}` // Der Key wird hier mitgeschickt
                        }
                    });
                    clearTimeout(timeout);

                    debugInfo += `Status: ${response.status}\n`;
                    debugInfo += `OK: ${response.ok}\n`;

                    const text = await response.text();
                    debugInfo += `Response length: ${text.length}\n`;
                    debugInfo += `Preview: ${text.substring(0, 300)}`;

                    return JSON.stringify({ result: debugInfo });

                } catch (fetchError) {
                    clearTimeout(timeout);
                    debugInfo += `Fetch error type: ${fetchError.name}\n`;
                    debugInfo += `Fetch error message: ${fetchError.message}\n`;
                    return JSON.stringify({ result: debugInfo });
                }

            } catch (e) {
                return JSON.stringify({ result: `Parse error: ${e.name}: ${e.message}` });
            }
        };
    </script>
</body>
</html>

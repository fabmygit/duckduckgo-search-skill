            const url = `https://s.jina.ai/${encodeURIComponent(query)}`;

                signal: controller.signal,
                headers: {

            const text = await response.text();

            if (!text || text.trim().length === 0) {
                return JSON.stringify({ result: `No results found for "${query}".` });
            }

            // Return first 1500 chars as result
            return JSON.stringify({ result: text.substring(0, 1500) });

        } catch (e) {
            if (e.name === 'AbortError') {
                return JSON.stringify({ error: "Search timed out." });
            }
            return JSON.stringify({ error: `Search failed: ${e.message}` });
        }

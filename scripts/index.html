            if (!query) {
                return JSON.stringify({ error: "No query provided." });

            // Timeout after 8 seconds
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);

            const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&origin=*`;

            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);

            const d = await response.json();

            const results = [];

            if (d.Answer) {
                results.push({ title: "Answer", snippet: d.Answer, url: `https://duckduckgo.com/?q=${encodeURIComponent(query)}` });
            }
            if (d.AbstractText) {
                results.push({ title: d.Heading || query, snippet: d.AbstractText, url: d.AbstractURL });
            }
            for (const t of (d.RelatedTopics || []).slice(0, 3)) {
                if (t.Text && t.FirstURL) {
                    results.push({ title: t.Text.substring(0, 60), snippet: t.Text, url: t.FirstURL });
                }
            }

            if (results.length === 0) {
                return JSON.stringify({ result: `No results found for "${query}". Try a different search term.` });
            }

            return JSON.stringify({ result: results });

        } catch (e) {
            if (e.name === 'AbortError') {
                return JSON.stringify({ error: "Search timed out. Please try again." });
            }
            return JSON.stringify({ error: `Search failed: ${e.message}` });
        }
    };
</script>
